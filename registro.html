<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Parroquial | BraiO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F1F5F9; font-family: 'Inter', sans-serif; }
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: none;
            padding: 30px;
            margin-top: 20px;
        }
        .form-label { font-weight: 600; color: #1A365D; font-size: 0.9rem; }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #E2E8F0;
            background-color: #F8FAFC;
        }
        .form-control:focus { border-color: #A82025; box-shadow: none; background: white; }
        .btn-submit {
            background-color: #1A365D;
            color: white;
            border-radius: 12px;
            padding: 15px;
            font-weight: 700;
            width: 100%;
            border: none;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #A82025; }
        @media (max-width: 576px) { .register-card { padding: 20px; border-radius: 0; } }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="register-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: #1A365D;">✍️ Nuevo Registro</h2>
                <p class="text-muted">Ingresa los datos de la actividad</p>
            </div>
            
            <form id="formEvento">
                <div class="mb-3">
                    <label class="form-label">TÍTULO DEL EVENTO</label>
                    <input type="text" id="titulo" class="form-control" placeholder="Ej: Misa de Difuntos" required>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">FECHA Y HORA</label>
                        <input type="datetime-local" id="fecha_hora" class="form-control" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">LUGAR</label>
                        <input type="text" id="lugar" class="form-control" placeholder="Ej: Templo" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">GRUPO RESPONSABLE</label>
                    <input type="text" id="grupo" class="form-control" placeholder="Ej: Coro San José">
                </div>

                <div class="mb-3">
                    <label class="form-label">ESTADO INICIAL</label>
                    <select id="estado" class="form-select">
                        <option value="Agendado">✅ Agendado</option>
                        <option value="Solicitado">⏳ Solicitado</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">NOTAS / DESCRIPCIÓN</label>
                    <textarea id="descripcion" class="form-control" rows="3" placeholder="Opcional..."></textarea>
                </div>

                <button type="submit" class="btn-submit">💾 Guardar Actividad</button>
            </form>
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwn5l3WFoq0YQYhxoYevv-1_f5iNxraiWBKbRIlLGa8IFT7593isaHqkAdfVEq21jmN/exec";

    document.getElementById('formEvento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const datos = {
            action: "crear",
            titulo: document.getElementById('titulo').value,
            fecha_hora: document.getElementById('fecha_hora').value,
            lugar: document.getElementById('lugar').value,
            grupo: document.getElementById('grupo').value,
            estado: document.getElementById('estado').value,
            descripcion: document.getElementById('descripcion').value
        };

        fetch(APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(datos)
        }).then(() => {
            alert("¡Actividad registrada!");
            location.reload();
        });
    });
</script>
</body>
</html>
