<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Parroquial | BraiO Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #F4F7FB; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .form-container {
            background: white;
            border-radius: 35px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .input-group-modern { margin-bottom: 25px; }
        .input-group-modern label {
            font-weight: 700; color: #1E3A8A; margin-bottom: 10px; display: block; margin-left: 5px;
        }
        .form-control, .form-select {
            border-radius: 18px;
            background-color: #F8FAFC;
            border: 2px solid transparent;
            padding: 15px 20px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            background-color: white; border-color: #E11D48; box-shadow: 0 10px 20px rgba(225, 29, 72, 0.05);
        }
        .btn-create {
            background-color: #7C3AED; /* Púrpura como en la imagen 2 */
            color: white;
            border-radius: 20px;
            padding: 18px;
            font-weight: 800;
            width: 100%;
            border: none;
            font-size: 1.2rem;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
        }
        .btn-create:hover { background-color: #6D28D9; }
        .brand-icon {
            width: 60px; height: 60px; background: #E11D48; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2rem; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="brand-icon">⛪</div>
    <h1 class="fw-bold mb-1">Nueva Actividad</h1>
    <p class="text-muted mb-5">Completa los datos para agendar en la comunidad.</p>

    <form id="formEvento">
        <div class="input-group-modern">
            <label>Título del evento</label>
            <input type="text" id="titulo" class="form-control" placeholder="Ej: Bautizos Comunitarios" required>
        </div>

        <div class="row">
            <div class="col-md-6 input-group-modern">
                <label>📅 Fecha y Hora</label>
                <input type="datetime-local" id="fecha_hora" class="form-control" required>
            </div>
            <div class="col-md-6 input-group-modern">
                <label>📍 Lugar</label>
                <input type="text" id="lugar" class="form-control" placeholder="Templo" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 input-group-modern">
                <label>👥 Grupo</label>
                <input type="text" id="grupo" class="form-control" placeholder="Ej: Coro">
            </div>
            <div class="col-md-6 input-group-modern">
                <label>🚦 Estado</label>
                <select id="estado" class="form-select">
                    <option value="Agendado">✅ Agendado</option>
                    <option value="Solicitado">⏳ Solicitado</option>
                </select>
            </div>
        </div>

        <div class="input-group-modern">
            <label>📝 Notas adicionales</label>
            <textarea id="descripcion" class="form-control" rows="2"></textarea>
        </div>

        <button type="submit" class="btn-create">＋ Crear Agenda</button>
    </form>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwn5l3WFoq0YQYhxoYevv-1_f5iNxraiWBKbRIlLGa8IFT7593isaHqkAdfVEq21jmN/exec";

    document.getElementById('formEvento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Sincronizando... 🔄";
        btn.disabled = true;

        const datos = {
            action: "crear",
            titulo: document.getElementById('titulo').value,
            fecha_hora: document.getElementById('fecha_hora').value,
            lugar: document.getElementById('lugar').value,
            grupo: document.getElementById('grupo').value,
            estado: document.getElementById('estado').value,
            descripcion: document.getElementById('descripcion').value
        };

        fetch(APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(datos)
        }).then(() => {
            alert("¡Listo! Agenda actualizada 🌟");
            location.reload();
        });
    });
</script>
</body>
</html>
