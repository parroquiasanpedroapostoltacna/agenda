<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛪ Nuestra Agenda Parroquial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1565C0; --secondary: #C62828; }
        body { font-family: 'Quicksand', sans-serif; background-color: #f8f9fa; font-size: 1.2rem; }
        
        .navbar-parroquia {
            background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 15px; border-bottom: 4px solid var(--secondary);
        }
        .calendar-card {
            background: white; border-radius: 30px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        
        /* Estilo Lista Aesthetic */
        .event-card {
            background: white; border: none; border-radius: 20px;
            margin-bottom: 15px; transition: 0.3s;
            border-left: 10px solid var(--primary); padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .event-card:hover { transform: translateY(-5px); }
        .event-title { color: var(--primary); font-weight: 700; font-size: 1.4rem; }
        .event-meta { color: #666; font-size: 1.1rem; margin-top: 5px; }
        .badge-status {
            border-radius: 50px; padding: 8px 15px; font-weight: 600;
        }
        
        /* Ajuste para gente mayor */
        .fc .fc-toolbar-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .fc .fc-button-primary { background-color: var(--primary); border: none; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-parroquia sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1" style="color: var(--primary); font-weight: 800;">⛪ Comunidad en Oración</span>
        <span class="fs-5">Hoy: <span id="fecha-hoy"></span></span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- Calendario -->
        <div class="col-lg-7">
            <div class="calendar-card">
                <h3 class="mb-4">📅 Vista Mensual</h3>
                <div id="calendar"></div>
            </div>
        </div>

        <!-- Listado -->
        <div class="col-lg-5">
            <h3 class="mb-4">🔔 Próximas Actividades</h3>
            <div id="lista-eventos">
                <!-- Se cargan dinámicamente -->
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwn5l3WFoq0YQYhxoYevv-1_f5iNxraiWBKbRIlLGa8IFT7593isaHqkAdfVEq21jmN/exec";

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('fecha-hoy').innerText = new Date().toLocaleDateString();
        cargarDatos();
    });

    function cargarDatos() {
        fetch(APP_URL)
        .then(res => res.json())
        .then(data => {
            renderCalendario(data);
            renderLista(data);
        });
    }

    function renderCalendario(eventos) {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
            events: eventos.map(ev => ({
                title: "📍 " + ev.Titulo,
                start: ev.Fecha_Hora,
                color: ev.Estado === 'Solicitado' ? '#FFC107' : '#1565C0'
            }))
        });
        calendar.render();
    }

    function renderLista(eventos) {
        const contenedor = document.getElementById('lista-eventos');
        contenedor.innerHTML = "";

        if(eventos.length === 0) {
            contenedor.innerHTML = "<h4>No hay eventos programados 😊</h4>";
            return;
        }

        eventos.forEach(ev => {
            const fecha = new Date(ev.Fecha_Hora);
            const card = `
                <div class="event-card shadow-sm">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="event-title">${ev.Titulo}</div>
                        <span class="badge ${ev.Estado === 'Agendado' ? 'bg-success' : 'bg-warning text-dark'} badge-status">
                            ${ev.Estado === 'Agendado' ? '✅' : '⏳'} ${ev.Estado}
                        </span>
                    </div>
                    <div class="event-meta">
                        <div>📅 ${fecha.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                        <div>⏰ ${fecha.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        <div>📍 Lugar: <b>${ev.Lugar}</b></div>
                        <div>👥 Grupo: <i>${ev.Grupo}</i></div>
                    </div>
                    <hr>
                    <p class="mb-0 text-muted">💬 ${ev.Descripcion || 'Sin descripción'}</p>
                </div>
            `;
            contenedor.innerHTML += card;
        });
    }
</script>
</body>
</html>
