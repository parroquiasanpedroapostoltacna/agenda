<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Parroquial | Sistema de Gestión</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Inter (Más profesional y seria) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #F2F4F7;
            --card-bg: #FFFFFF;
            --primary-blue: #1A365D; /* Azul institucional serio */
            --accent-red: #A82025;   /* Rojo parroquial elegante */
            --text-main: #1F2937;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Contenedor estilo Dashboard de la imagen */
        .app-container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar similar a la imagen BraiO */
        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        /* Contenido Principal */
        .main-content {
            flex-grow: 1;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .header-title {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-bottom: 25px;
        }

        /* Botón estilo BraiO */
        .btn-apply {
            background-color: var(--primary-blue);
            color: white;
            border-radius: 12px;
            padding: 10px 24px;
            font-weight: 600;
            border: none;
            transition: 0.2s;
        }

        .btn-apply:hover {
            background-color: var(--accent-red);
            color: white;
        }

        /* FullCalendar Customization para que parezca la imagen */
        .fc { border: none !important; }
        .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 700 !important; color: #4B5563; }
        .fc-button { 
            background: #F9FAFB !important; 
            border: 1px solid var(--border-color) !important; 
            color: #4B5563 !important;
            text-transform: capitalize !important;
            border-radius: 8px !important;
        }
        .fc-daygrid-day-number { font-size: 0.9rem; color: #6B7280; padding: 10px !important; }
        .fc-col-header-cell-cushion { font-size: 0.8rem; text-transform: uppercase; color: #9CA3AF; text-decoration: none; }
        
        /* Eventos en el calendario */
        .fc-event {
            border-radius: 6px !important;
            padding: 2px 5px !important;
            font-size: 0.85rem !important;
            border: none !important;
        }

        /* Lista de eventos debajo (Mobile friendly) */
        .event-list-item {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-agendado { background: #E0F2FE; color: #0369A1; }
        .status-solicitado { background: #FEF3C7; color: #92400E; }

        /* RESPONSIVIDAD (Móvil) */
        @media (max-width: 992px) {
            .app-container { flex-direction: column; padding: 10px; }
            .sidebar { width: 100%; order: 2; padding: 20px; }
            .main-content { width: 100%; order: 1; padding: 15px; border-radius: 15px; }
            .fc-toolbar { flex-direction: column; gap: 10px; }
            .header-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar Informativo -->
    <div class="sidebar">
        <div class="mb-4 text-center text-lg-start">
            <h5 class="fw-bold mb-0">Parroquia</h5>
            <small class="text-muted text-uppercase" style="letter-spacing: 1px;">Gestión de Agenda</small>
        </div>
        
        <div class="mt-2 mb-4 d-none d-lg-block">
            <label class="text-muted small fw-bold mb-2 d-block">HOY</label>
            <h4 id="current-date" class="fw-bold text-dark">--</h4>
        </div>

        <div id="event-details" class="mt-3">
            <p class="text-muted small">Haz clic en un evento del calendario para ver los detalles aquí.</p>
        </div>
        
        <div class="mt-auto pt-4 border-top d-none d-lg-block">
            <p class="small text-muted mb-0">Secretaría Parroquial</p>
            <p class="small text-muted">v2.1 - 2024</p>
        </div>
    </div>

    <!-- Contenido Central -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="header-title mb-0">Calendario de Actividades</h2>
            <button class="btn btn-apply d-lg-none" onclick="location.reload()">🔄</button>
        </div>

        <!-- El Calendario principal -->
        <div id="calendar"></div>

        <!-- Lista para móviles -->
        <div class="mt-5 d-lg-none">
            <h5 class="fw-bold mb-3">Próximos Eventos</h5>
            <div id="mobile-event-list">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwn5l3WFoq0YQYhxoYevv-1_f5iNxraiWBKbRIlLGa8IFT7593isaHqkAdfVEq21jmN/exec";

    document.addEventListener('DOMContentLoaded', function() {
        const dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', dateOptions);
        
        cargarDatos();
    });

    function cargarDatos() {
        fetch(APP_URL)
        .then(res => res.json())
        .then(data => {
            renderCalendario(data);
            renderListaMovil(data);
        });
    }

    function renderCalendario(eventos) {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth',
            locale: 'es',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            events: eventos.map(ev => ({
                title: ev.Titulo,
                start: ev.Fecha_Hora,
                extendedProps: ev,
                backgroundColor: ev.Estado === 'Agendado' ? '#1A365D' : '#A82025'
            })),
            eventClick: (info) => mostrarDetalle(info.event.extendedProps)
        });
        calendar.render();
    }

    function renderListaMovil(eventos) {
        const listContainer = document.getElementById('mobile-event-list');
        listContainer.innerHTML = "";
        
        // Mostrar solo los próximos 5
        eventos.slice(0, 5).forEach(ev => {
            const date = new Date(ev.Fecha_Hora);
            listContainer.innerHTML += `
                <div class="event-list-item">
                    <div>
                        <div class="fw-bold text-dark">${ev.Titulo}</div>
                        <div class="small text-muted">${date.toLocaleDateString()} - ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                    <span class="status-badge ${ev.Estado === 'Agendado' ? 'status-agendado' : 'status-solicitado'}">${ev.Estado}</span>
                </div>
            `;
        });
    }

    function mostrarDetalle(ev) {
        const date = new Date(ev.Fecha_Hora);
        const detailsContainer = document.getElementById('event-details');
        detailsContainer.innerHTML = `
            <div class="p-3 rounded-4" style="background: #F9FAFB; border: 1px solid var(--border-color);">
                <span class="status-badge ${ev.Estado === 'Agendado' ? 'status-agendado' : 'status-solicitado'} mb-2 d-inline-block">${ev.Estado}</span>
                <h5 class="fw-bold mb-2">${ev.Titulo}</h5>
                <hr>
                <div class="small mb-1"><strong>📍 Lugar:</strong> ${ev.Lugar}</div>
                <div class="small mb-1"><strong>⏰ Hora:</strong> ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                <div class="small mb-1"><strong>👥 Grupo:</strong> ${ev.Grupo}</div>
                <p class="small text-muted mt-2">${ev.Descripcion || 'Sin descripción adicional.'}</p>
            </div>
        `;
    }
</script>
</body>
</html>
